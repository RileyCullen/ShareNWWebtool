<html>
    <head>
        <script src="https://d3js.org/d3.v4.min.js"></script>
        <script src="https://unpkg.com/konva@7.0.3/konva.min.js"></script>

        <script src='ConcreteCharts/ABarChart.js'></script>
        <script src='ConcreteCharts/BasicBarChart.js'></script>
        <script src='ConcreteCharts/StackedBarChart.js'></script>

        <script src='Decorators/ABarChartDecorator.js'></script>
        <script src='Decorators/YAxisDecorator.js'></script>
        <script src='Decorators/XAxisDecorator.js'></script>
        <script src='Decorators/RemainderDecorator.js'></script>
        <script src='Decorators/LabelDecorator.js'></script>
        <script src='Decorators/ChartDescriptorDecorator.js'></script>

        <script src='/Users/rileycullen/Documents/IndependentStudy/fq2020/Webtool code/FontWidthDetector.js'></script>
    </head>
    <body>
        <div id='container'></div>
        <script>
            var stage = new Konva.Stage({
                container: 'container',
                width: 500, 
                height: 500,
            });
            
            var main = new Konva.Layer();

            main.add(new Konva.Rect({
                x: 0, 
                y: 0, 
                width: stage.width(),
                height: stage.height(),
                fill: 'white',
                stroke: 'black',
            }));

            stage.add(main);

            var chartHeight = 250, chartWidth = 250, startingX = 100, startingY = 150;
            var testGroup = new Konva.Group({
                x: startingX, 
                y: startingY,
                draggable: true,
            });
            main.add(testGroup);

            var data = [];
            data[0] = {
                'category': 'dogs',
                'value': 60,
                'color': 'lightblue'
            };
            data[1] = {
                'category': 'cats',
                'value': 18,
                'color': 'red'
            };
        
            var barChart = new BasicBarChart(data, testGroup, chartHeight, chartWidth, 0.4, 90);
            var yAxis = new YAxisDecorator(barChart)
            var xAxis = new XAxisDecorator(yAxis);
            var label = new ChartDescriptorDecorator(xAxis);

            label.CreateBarChart();


            main.draw();
        </script>
    </body>
</html>
